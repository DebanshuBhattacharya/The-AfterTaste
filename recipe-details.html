<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Details | The AfterTaste</title>
    <meta name="description" content="Read full recipe details and discover related dishes on The AfterTaste." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="recipe-details.css" />
  </head>
  <body>

    <header class="header">
      <a class="logo" href="index.html">The AfterTaste</a>
      <div class="header-right">
        <a href="index.html#recipes" class="back-link">
          <i class="fa-solid fa-arrow-left"></i> All Recipes
        </a>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">🌙</button>
      </div>
    </header>

    <div class="container">

      <article class="hero reveal">
        <div class="hero-img-wrap">
          <img id="recipeImage" src="" alt="" />
        </div>
        <div class="hero-content">
          <span class="tag" id="recipeCategory"></span>
          <h1 id="recipeTitle"></h1>
          <p class="publish-date" id="recipeMeta"></p>
          <p id="recipeDescription"></p>
          <button class="save-btn" id="pageSaveBtn" type="button" aria-label="Save recipe">
            <i class="fa-regular fa-bookmark"></i>
            <span>Save Recipe</span>
          </button>
        </div>
      </article>

      <div class="detail-grid">

        <section class="section reveal-left">
          <h2><i class="fa-solid fa-list-ul"></i> Ingredients</h2>
          <ul id="ingredientsList"></ul>
        </section>

        <section class="section reveal-right">
          <h2><i class="fa-solid fa-utensils"></i> How To Make It</h2>
          <ol id="stepsList"></ol>
        </section>

      </div>

      <section class="section zoom-reveal">
        <h2><i class="fa-solid fa-fire"></i> Related Recipes</h2>
        <div class="related-grid" id="relatedGrid"></div>
      </section>

    </div>

    <footer class="footer">&copy; 2026 The AfterTaste. All rights reserved.</footer>

    <button class="back-to-top" id="backToTop" type="button" aria-label="Scroll back to top">
      <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="recipe-details.js"></script>
  </body>
</html>
